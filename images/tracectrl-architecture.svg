<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 880" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <rect width="1100" height="880" fill="#0D1117"/>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B7280"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#A78BFA"/>
    </marker>
  </defs>

  <!-- ============= Row 1: Agent + Protector Plus sidecar ============= -->

  <!-- Agent container -->
  <rect x="40" y="40" width="700" height="170" rx="12" fill="#0E1726" stroke="#374151" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="60" y="70" fill="#9CA3AF" font-size="11" font-weight="600" letter-spacing="0.08em">YOUR AGENT · PYTHON PROCESS</text>

  <!-- Framework Instrumentor -->
  <rect x="60" y="90" width="200" height="105" rx="8" fill="#0F1C2E" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="160" y="115" text-anchor="middle" fill="#4A90D9" font-size="13" font-weight="600">Framework</text>
  <text x="160" y="131" text-anchor="middle" fill="#4A90D9" font-size="13" font-weight="600">Instrumentor</text>
  <text x="160" y="153" text-anchor="middle" fill="#9CA3AF" font-size="10">strands · agno · crewai</text>
  <text x="160" y="167" text-anchor="middle" fill="#9CA3AF" font-size="10">langchain · google-adk</text>
  <text x="160" y="184" text-anchor="middle" fill="#6B7280" font-size="9">OpenInference base</text>

  <!-- TraceCtrl SDK core -->
  <rect x="280" y="90" width="200" height="105" rx="8" fill="#1A0606" stroke="#FC0404" stroke-width="1.5"/>
  <text x="380" y="115" text-anchor="middle" fill="#FF4444" font-size="13" font-weight="600">TraceCtrl SDK</text>
  <text x="290" y="138" fill="#FCA5A5" font-size="10">• configure()</text>
  <text x="290" y="153" fill="#FCA5A5" font-size="10">• tag_agent()</text>
  <text x="290" y="168" fill="#FCA5A5" font-size="10">• TraceCtrlSpanProcessor</text>
  <text x="290" y="183" fill="#FCA5A5" font-size="10">• infer_tool_category</text>

  <!-- Guardrails + Protector client -->
  <rect x="500" y="90" width="220" height="105" rx="8" fill="#0F1C0F" stroke="#22C55E" stroke-width="1.5"/>
  <text x="610" y="115" text-anchor="middle" fill="#22C55E" font-size="13" font-weight="600">Guardrails</text>
  <text x="510" y="138" fill="#86EFAC" font-size="10">• Guardrail (LLM judge)</text>
  <text x="510" y="153" fill="#86EFAC" font-size="10">• wrap_agent_with_guardrails</text>
  <text x="510" y="168" fill="#86EFAC" font-size="10">• guard() · check_input</text>
  <text x="510" y="183" fill="#86EFAC" font-size="10">• check_output (Protector)</text>

  <!-- Protector Plus sidecar -->
  <rect x="790" y="90" width="270" height="105" rx="8" fill="#170A1F" stroke="#A78BFA" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="925" y="115" text-anchor="middle" fill="#A78BFA" font-size="13" font-weight="600">Protector Plus</text>
  <text x="925" y="131" text-anchor="middle" fill="#C4B5FD" font-size="10">External LLM firewall (optional)</text>
  <text x="800" y="155" fill="#C4B5FD" font-size="10">• 7 sub-guardrails (llm, keyword,</text>
  <text x="800" y="170" fill="#C4B5FD" font-size="10">  pii, regex, vector, ...)</text>
  <text x="800" y="185" fill="#C4B5FD" font-size="10">• POST /apikey/api/protectorplus/v1</text>

  <!-- HTTP arrow Guardrails → Protector Plus -->
  <line x1="720" y1="142" x2="790" y2="142" stroke="#A78BFA" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <text x="755" y="135" text-anchor="middle" fill="#A78BFA" font-size="9">HTTP</text>
  <text x="755" y="159" text-anchor="middle" fill="#A78BFA" font-size="9">X-API-Key</text>

  <!-- ============= Arrow: Agent → Collector ============= -->
  <line x1="390" y1="210" x2="390" y2="265" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="400" y="240" fill="#9CA3AF" font-size="11">OTLP · gRPC :4317  |  HTTP :4318</text>

  <!-- ============= Row 2: OTel Collector ============= -->
  <rect x="220" y="265" width="340" height="70" rx="10" fill="#091918" stroke="#8BC4BF" stroke-width="1.5"/>
  <text x="390" y="293" text-anchor="middle" fill="#8BC4BF" font-size="14" font-weight="600">OTel Collector</text>
  <text x="390" y="311" text-anchor="middle" fill="#9CA3AF" font-size="10">otel/opentelemetry-collector-contrib</text>
  <text x="390" y="326" text-anchor="middle" fill="#6B7280" font-size="10">batches → clickhouseexporter</text>

  <!-- ============= Arrow: Collector → ClickHouse ============= -->
  <line x1="390" y1="335" x2="390" y2="390" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="400" y="368" fill="#9CA3AF" font-size="11">native :9000</text>

  <!-- ============= Row 3: ClickHouse ============= -->
  <rect x="160" y="390" width="460" height="125" rx="10" fill="#171200" stroke="#FFBB00" stroke-width="1.5"/>
  <text x="390" y="418" text-anchor="middle" fill="#FFBB00" font-size="14" font-weight="600">ClickHouse</text>
  <text x="390" y="434" text-anchor="middle" fill="#9CA3AF" font-size="10">:8123 (HTTP)  ·  :9000 (native)</text>
  <text x="180" y="458" fill="#FCD34D" font-size="10">otel_traces</text>
  <text x="285" y="458" fill="#FCD34D" font-size="10">agent_inventory</text>
  <text x="420" y="458" fill="#FCD34D" font-size="10">topology_agent_edges</text>
  <text x="180" y="476" fill="#FCD34D" font-size="10">topology_tool_edges</text>
  <text x="320" y="476" fill="#FCD34D" font-size="10">attack_paths</text>
  <text x="430" y="476" fill="#FCD34D" font-size="10">agent_risk_scores</text>
  <text x="180" y="494" fill="#FCD34D" font-size="10">guardrail_registry</text>
  <text x="305" y="494" fill="#FCD34D" font-size="10">guardrail_violations</text>
  <text x="445" y="494" fill="#FCD34D" font-size="10">protector_plus_config</text>
  <text x="180" y="510" fill="#FCD34D" font-size="10">scan_results</text>
  <text x="270" y="510" fill="#FCD34D" font-size="10">scan_topology</text>
  <text x="370" y="510" fill="#FCD34D" font-size="10">system_risk</text>

  <!-- ============= Arrow: ClickHouse → Engine ============= -->
  <line x1="390" y1="515" x2="390" y2="570" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="400" y="548" fill="#9CA3AF" font-size="11">read + write</text>

  <!-- ============= Row 4: Intelligence Engine ============= -->
  <rect x="160" y="570" width="460" height="130" rx="10" fill="#0F0A1F" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="390" y="598" text-anchor="middle" fill="#A78BFA" font-size="14" font-weight="600">Intelligence Engine</text>
  <text x="390" y="615" text-anchor="middle" fill="#9CA3AF" font-size="10">FastAPI · :8000 · /api/v1/*</text>
  <text x="180" y="640" fill="#C4B5FD" font-size="10">⏱  APScheduler tick · 60s default</text>
  <text x="180" y="657" fill="#C4B5FD" font-size="10">     fetch → inventory → topology → violations</text>
  <text x="180" y="671" fill="#C4B5FD" font-size="10">     → registry → attack graph (TAGAAI)</text>
  <text x="180" y="690" fill="#C4B5FD" font-size="10">📡  REST + SSE /violations/stream</text>

  <!-- ============= Arrow: Engine → Dashboard ============= -->
  <line x1="390" y1="700" x2="390" y2="755" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="400" y="733" fill="#9CA3AF" font-size="11">HTTP · React Query</text>

  <!-- ============= Row 5: Dashboard ============= -->
  <rect x="160" y="755" width="460" height="105" rx="10" fill="#021A09" stroke="#22C55E" stroke-width="1.5"/>
  <text x="390" y="783" text-anchor="middle" fill="#22C55E" font-size="14" font-weight="600">Dashboard</text>
  <text x="390" y="799" text-anchor="middle" fill="#9CA3AF" font-size="10">React + Vite + TypeScript · :3000</text>
  <text x="200" y="822" fill="#86EFAC" font-size="10" font-weight="600">Monitor</text>
  <text x="200" y="838" fill="#86EFAC" font-size="9">/agents · /sessions</text>
  <text x="200" y="852" fill="#86EFAC" font-size="9">/topology</text>
  <text x="340" y="822" fill="#86EFAC" font-size="10" font-weight="600">Security</text>
  <text x="340" y="838" fill="#86EFAC" font-size="9">/alerts · /guardrails</text>
  <text x="340" y="852" fill="#86EFAC" font-size="9">/scan · /risk · /attacks</text>
  <text x="500" y="822" fill="#86EFAC" font-size="10" font-weight="600">Configure</text>
  <text x="500" y="838" fill="#86EFAC" font-size="9">/settings</text>
  <text x="500" y="852" fill="#86EFAC" font-size="9">(TraceCtrl Guards)</text>

  <!-- ============= Side annotation: Guardrail spans flow ============= -->
  <g transform="translate(700, 250)">
    <rect x="0" y="0" width="370" height="180" rx="10" fill="#0E0E0E" stroke="#374151" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="185" y="24" text-anchor="middle" fill="#9CA3AF" font-size="11" font-weight="600" letter-spacing="0.06em">GUARDRAIL SPAN PATH</text>

    <text x="20" y="52" fill="#22C55E" font-size="11">①</text>
    <text x="40" y="52" fill="#D1D5DB" font-size="10">SDK Guardrail.evaluate() emits</text>
    <text x="40" y="66" fill="#86EFAC" font-size="10" font-family="ui-monospace, monospace">tracectrl.guardrail.evaluation</text>

    <text x="20" y="92" fill="#A78BFA" font-size="11">②</text>
    <text x="40" y="92" fill="#D1D5DB" font-size="10">protector.check_input/output emits</text>
    <text x="40" y="106" fill="#C4B5FD" font-size="10" font-family="ui-monospace, monospace">provider = "protector_plus"</text>

    <text x="20" y="132" fill="#FFBB00" font-size="11">③</text>
    <text x="40" y="132" fill="#D1D5DB" font-size="10">Engine pipeline ingests both into</text>
    <text x="40" y="146" fill="#FCD34D" font-size="10" font-family="ui-monospace, monospace">guardrail_violations</text>

    <text x="20" y="170" fill="#06B6D4" font-size="11">④</text>
    <text x="40" y="170" fill="#D1D5DB" font-size="10">surfaces on /alerts + /guardrails</text>
  </g>

  <!-- Connector from Protector Plus down to the annotation box -->
  <line x1="925" y1="200" x2="925" y2="248" stroke="#A78BFA" stroke-width="1" stroke-dasharray="3 3"/>
</svg>
